  <body style="background-color: #0d0d0d; margin: 0; padding: 0;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      async function enrichAndTrack() {
        // Load Umami engine for the MAIN PORTFOLIO
        const script = document.createElement('script');
        script.defer = true;
        script.src = 'https://umami-lovat-six-54.vercel.app/script.js';
        script.setAttribute('data-website-id', '3188ca57-e0ca-421b-b853-e5243ba427e3');
        script.setAttribute('data-auto-track', 'false'); 
        document.head.appendChild(script);

        script.onload = async () => {
          try {
            // 1. Memory check to save API calls
            let organization = sessionStorage.getItem('b2b_org');

            if (!organization) {
              const response = await fetch('https://ipinfo.io/json?token=%VITE_IPINFO_TOKEN%');
              const data = await response.json();
              organization = data.org || 'Unknown Network';
              sessionStorage.setItem('b2b_org', organization);
            }

            // 2. Define the exact tracking payload
            const fireTrack = () => {
              if (window.umami) {
                window.umami.track(props => ({
                  ...props,
                  data: { company: organization }
                }));
              }
            };

            // 3. Fire on the initial page load
            fireTrack();

            // 4. Hijack the History API to listen for React Router navigations
            const originalPushState = history.pushState;
            history.pushState = function () {
              originalPushState.apply(this, arguments);
              fireTrack(); // Fire tracking again when React pushes a new route
            };

            const originalReplaceState = history.replaceState;
            history.replaceState = function () {
              originalReplaceState.apply(this, arguments);
              fireTrack();
            };

            window.addEventListener('popstate', fireTrack); // Catch browser back/forward buttons
            
          } catch (error) {
            if (window.umami) { window.umami.track(); }
          }
        };
      }

      enrichAndTrack();
    </script>
  </body>
